<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our 1st Anniversary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/boxicons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="envelope-overlay" class="d-flex flex-column align-items-center justify-content-center">
        <div class="envelope-wrapper text-center animate-bounce" id="open-envelope-btn">
            <span class="envelope-icon">✉️</span>
            <p class="mt-3 fw-bold tracking-wide text-uppercase">You received a letter<br><small class="text-muted">(Click to open)</small></p>
        </div>
    </div>

    <main id="main-content" class="invisible-content">
        
        <section class="hero-section position-relative vh-100 w-100 overflow-hidden d-flex align-items-center justify-content-center">
            
            <video autoplay loop muted playsinline class="hero-video position-absolute top-50 start-50 translate-middle w-100 h-100">
                <source src="/images/0608.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>

            <div class="video-overlay position-absolute top-0 start-0 w-100 h-100"></div>

            <div class="container position-relative text-center text-white z-2 px-4">
                <h1 class="script-font display-1 mb-2 fade-in-up">365 Days with You</h1>
                <p class="lead-text fw-light tracking-widest text-uppercase mb-0 fade-in-up-delay">Happy 1st Anniversary</p>
            </div>
            
        </section>

        <section class="time-section py-5 d-flex align-items-center">
            <div class="container text-center py-4">
                
                <h2 class="script-font display-4 mb-2 section-title">Growing Together In...</h2>
                <p class="text-muted small tracking-widest text-uppercase mb-5">Every Single Second Matters</p>

                <div class="row g-3 g-md-4 justify-content-center">
                    
                    <div class="col-4 col-md-2">
                        <div class="stat-card p-3 p-md-4 rounded-4 shadow-sm h-100">
                            <h3 class="display-6 fw-bold stat-number mb-1" id="count-years">0</h3>
                            <span class="text-uppercase tracking-wider stat-label text-muted">Years Together</span>
                        </div>
                    </div>

                    <div class="col-4 col-md-2">
                        <div class="stat-card p-3 p-md-4 rounded-4 shadow-sm h-100">
                            <h3 class="display-6 fw-bold stat-number mb-1" id="count-months">0</h3>
                            <span class="text-uppercase tracking-wider stat-label text-muted">Months of Love</span>
                        </div>
                    </div>

                    <div class="col-4 col-md-2">
                        <div class="stat-card p-3 p-md-4 rounded-4 shadow-sm h-100">
                            <h3 class="display-6 fw-bold stat-number mb-1" id="count-days">0</h3>
                            <span class="text-uppercase tracking-wider stat-label text-muted">Beautiful Days</span>
                        </div>
                    </div>

                    <div class="col-4 col-md-2">
                        <div class="stat-card p-3 p-md-4 rounded-4 shadow-sm h-100">
                            <h3 class="display-6 fw-bold stat-number mb-1" id="count-hours">00</h3>
                            <span class="text-uppercase tracking-wider stat-label text-muted">Countless Hours</span>
                        </div>
                    </div>

                    <div class="col-4 col-md-2">
                        <div class="stat-card p-3 p-md-4 rounded-4 shadow-sm h-100">
                            <h3 class="display-6 fw-bold stat-number mb-1" id="count-minutes">00</h3>
                            <span class="text-uppercase tracking-wider stat-label text-muted">Short Minutes</span>
                        </div>
                    </div>

                    <div class="col-4 col-md-2">
                        <div class="stat-card p-3 p-md-4 rounded-4 shadow-sm h-100">
                            <h3 class="display-6 fw-bold stat-number mb-1" id="count-seconds">00</h3>
                            <span class="text-uppercase tracking-wider stat-label text-muted">Brief Seconds</span>
                        </div>
                    </div>

                </div> 
            </div>
        </section>

        </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
